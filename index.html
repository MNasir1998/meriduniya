<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meri Habibti 💕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Marck+Script&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --blush: #f7e1e6;
    --rose: #e6a4b4;
    --deep-rose: #c96b83;
    --plum: #5b2a3a;
    --cream: #fff6f2;
    --gold: #cfa15e;
    --ink: #452433;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    font-family:'Nunito', sans-serif;
    background: radial-gradient(ellipse at top, #fdf0ee 0%, var(--blush) 55%, #f3c9d3 100%);
    color: var(--ink);
    overflow-x:hidden;
  }
  #app{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  /* ---------- floating ambient hearts ---------- */
  .bg-hearts{
    position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0;
  }
  .bg-heart{
    position:absolute;
    bottom:-10%;
    font-size:20px;
    color: var(--rose);
    opacity:0.35;
    animation: floatUp linear infinite;
    filter: drop-shadow(0 0 2px rgba(230,164,180,0.4));
  }
  @keyframes floatUp{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.5; }
    90%{ opacity:0.4; }
    100%{ transform: translateY(-110vh) translateX(var(--drift,20px)) rotate(20deg); opacity:0; }
  }

  /* ---------- LOCK SCREEN ---------- */
  .lock-card{
    position:relative; z-index:2;
    width:min(90vw, 380px);
    background: linear-gradient(180deg, #fffdfc, #fdf1f1);
    border-radius: 28px;
    padding: 48px 32px 40px;
    text-align:center;
    box-shadow: 0 25px 60px -20px rgba(91,42,58,0.35), 0 0 0 1px rgba(207,161,94,0.15);
    transition: transform .5s ease, opacity .5s ease;
  }
  .lock-card.shake{ animation: shake .45s ease; }
  @keyframes shake{
    10%,90%{ transform:translateX(-2px); }
    20%,80%{ transform:translateX(4px); }
    30%,50%,70%{ transform:translateX(-8px); }
    40%,60%{ transform:translateX(8px); }
  }

  .locket{
    width:78px; height:78px; margin:0 auto 22px;
    border-radius:50%;
    background: linear-gradient(160deg, var(--rose), var(--deep-rose));
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 10px 25px -8px rgba(201,107,131,0.6), inset 0 2px 4px rgba(255,255,255,0.4);
    position:relative;
  }
  .locket svg{ width:34px; height:34px; }
  .locket::after{
    content:'';
    position:absolute; inset:-8px;
    border-radius:50%;
    border:1px solid rgba(207,161,94,0.5);
  }

  .eyebrow{
    font-size:12px; letter-spacing:3px; text-transform:uppercase;
    color: var(--gold); font-weight:600; margin-bottom:10px;
  }
  h1.lock-title{
    font-family:'Cormorant Garamond', serif;
    font-size: 30px; font-weight:600; margin: 0 0 8px;
    color: var(--plum);
  }
  .lock-sub{
    font-size:14px; color:#8a5a67; margin:0 0 28px; line-height:1.5;
  }

  .pass-row{
    display:flex; gap:10px; margin-bottom:8px;
  }
  input#passkey{
    flex:1;
    padding:14px 16px;
    border-radius:14px;
    border:1.5px solid #ecc7d0;
    background: #fffaf9;
    font-size:16px;
    letter-spacing:2px;
    text-align:center;
    color: var(--plum);
    outline:none;
    transition: border-color .25s, box-shadow .25s;
  }
  input#passkey:focus{
    border-color: var(--rose);
    box-shadow: 0 0 0 4px rgba(230,164,180,0.25);
  }
  .unlock-btn{
    margin-top:16px;
    width:100%;
    padding:14px 16px;
    border:none;
    border-radius:14px;
    background: linear-gradient(135deg, var(--deep-rose), #b95c76);
    color: #fff8f6;
    font-size:15px;
    font-weight:600;
    letter-spacing:0.5px;
    cursor:pointer;
    box-shadow: 0 12px 25px -10px rgba(201,107,131,0.65);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .unlock-btn:hover{ transform: translateY(-2px); box-shadow: 0 16px 30px -10px rgba(201,107,131,0.75); }
  .unlock-btn:active{ transform: translateY(0px) scale(0.98); }

  .hint{
    margin-top:16px; font-size:12px; color:#b98593; min-height:16px;
  }

  /* ---------- REVEAL SCREEN ---------- */
  .reveal{
    position:relative; z-index:2;
    width:min(92vw, 560px);
    text-align:center;
    padding: 20px 10px 60px;
    display:none;
  }
  .reveal.show{ display:block; animation: revealIn 1s ease forwards; }
  @keyframes revealIn{
    from{ opacity:0; transform: translateY(30px) scale(0.96); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  .big-heart-wrap{
    position:relative;
    width:120px; height:120px;
    margin: 0 auto 22px;
  }
  .big-heart{
    width:100%; height:100%;
    color: var(--deep-rose);
    filter: drop-shadow(0 12px 22px rgba(201,107,131,0.45));
    animation: pulse 1.6s ease-in-out infinite;
    transform-origin:center;
  }
  @keyframes pulse{
    0%,100%{ transform: scale(1); }
    50%{ transform: scale(1.12); }
  }

  .to-line{
    font-family:'Marck Script', cursive;
    font-size: 22px;
    color: var(--gold);
    margin-bottom: 2px;
  }
  h1.name{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:600;
    font-size: clamp(32px, 7vw, 52px);
    margin: 0 0 6px;
    color: var(--plum);
    line-height:1.1;
  }
  .headline{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size: clamp(20px, 4vw, 26px);
    color: var(--deep-rose);
    margin: 0 0 26px;
    letter-spacing:0.5px;
  }

  .message-card{
    background: linear-gradient(180deg, #fffdfc, #fef1ef);
    border-radius: 24px;
    padding: 30px 26px;
    box-shadow: 0 20px 50px -20px rgba(91,42,58,0.3), 0 0 0 1px rgba(207,161,94,0.15);
    position:relative;
  }
  .message-card::before{
    content:'“';
    position:absolute; top:6px; left:18px;
    font-family:'Cormorant Garamond', serif;
    font-size:60px;
    color: rgba(207,161,94,0.35);
    line-height:1;
  }
  #message-text{
    font-family:'Cormorant Garamond', serif;
    font-size: clamp(17px, 3vw, 20px);
    line-height:1.75;
    color: var(--ink);
    min-height: 4.5em;
    white-space: pre-wrap;
  }
  .cursor{
    display:inline-block;
    width:2px; height:1em;
    background: var(--deep-rose);
    vertical-align:-2px;
    animation: blink 0.8s step-end infinite;
    margin-left:2px;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  .signature{
    margin-top:18px;
    font-family:'Marck Script', cursive;
    font-size:20px;
    color: var(--gold);
    opacity:0;
    transition: opacity 1s ease;
  }
  .signature.show{ opacity:1; }

  .more-love-btn{
    margin-top: 30px;
    padding: 13px 28px;
    border:none;
    border-radius: 999px;
    background: transparent;
    border: 1.5px solid var(--deep-rose);
    color: var(--deep-rose);
    font-weight:600;
    font-size:14px;
    letter-spacing:0.5px;
    cursor:pointer;
    transition: all .25s ease;
    opacity:0;
  }
  .more-love-btn.show{ opacity:1; }
  .more-love-btn:hover{
    background: var(--deep-rose);
    color:#fff;
    box-shadow: 0 10px 25px -8px rgba(201,107,131,0.6);
  }

  /* confetti hearts burst */
  .burst-heart{
    position:fixed;
    top:50%; left:50%;
    font-size:18px;
    color: var(--deep-rose);
    pointer-events:none;
    z-index:5;
    animation: burst 1.4s ease-out forwards;
  }
  @keyframes burst{
    to{
      transform: translate(var(--bx), var(--by)) rotate(var(--br));
      opacity:0;
    }
  }

  @media (max-width:420px){
    .lock-card{ padding:38px 22px 32px; }
  }

  @media (prefers-reduced-motion: reduce){
    .bg-heart, .big-heart, .cursor{ animation: none !important; }
  }
</style>
</head>
<body>

<div class="bg-hearts" id="bgHearts"></div>

<div id="app">

  <!-- LOCK SCREEN -->
  <div class="lock-card" id="lockCard">
    <div class="eyebrow">A Little Secret</div>
    <div class="locket">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 21s-7.5-4.6-10-9.3C.4 8.1 2.2 4.5 5.6 4c2-.3 3.9.6 5 2.2C11.7 4.6 13.6 3.7 15.6 4c3.4.5 5.2 4.1 3.6 7.7C16.8 16.4 12 21 12 21z" fill="#fff8f6"/>
      </svg>
    </div>
    <h1 class="lock-title">This one's just for you</h1>
    <p class="lock-sub">Enter the passkey to unlock your surprise, meri jan.</p>
    <div class="pass-row">
      <input type="password" id="passkey" placeholder="passkey" inputmode="numeric" maxlength="12" />
    </div>
    <button class="unlock-btn" id="unlockBtn">Unlock ♡</button>
    <div class="hint" id="hint"></div>
  </div>

  <!-- REVEAL SCREEN -->
  <div class="reveal" id="reveal">
    <div class="big-heart-wrap">
      <svg class="big-heart" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 21s-7.5-4.6-10-9.3C.4 8.1 2.2 4.5 5.6 4c2-.3 3.9.6 5 2.2C11.7 4.6 13.6 3.7 15.6 4c3.4.5 5.2 4.1 3.6 7.7C16.8 16.4 12 21 12 21z"/>
      </svg>
    </div>
    <div class="to-line">you are</div>
    <h1 class="name">Meri Dunia, Mera Sabkuch</h1>
    <div class="headline">meri habibti &nbsp;•&nbsp; meri jaan ka tukda &nbsp;•&nbsp; mera sukoon</div>

    <div class="message-card">
      <div id="message-text"><span id="typed"></span><span class="cursor" id="typeCursor"></span></div>
      <div class="signature" id="signature">— mera dil, sirf tumhare liye</div>
    </div>

    <button class="more-love-btn" id="moreLoveBtn">tap for more love 💕</button>

    <!--
      MUSIC: drop your romantic mp3 next to this file and set the src below,
      e.g. src="our-song.mp3" — then this button will play/pause it.
      Leave src empty and the button just stays hidden (see JS).
    -->
    <audio id="bgMusic" loop preload="none">
      <source src="our-song.mp3" type="audio/mpeg">
    </audio>
    <button class="more-love-btn" id="musicBtn" style="display:none; margin-top:14px;">♪ play our song</button>
  </div>

</div>

<script>
  // ---------- ambient floating hearts ----------
  const bgHearts = document.getElementById('bgHearts');
  const heartSymbols = ['♥','❤','💕'];
  function spawnBgHeart(){
    const el = document.createElement('div');
    el.className = 'bg-heart';
    el.textContent = heartSymbols[Math.floor(Math.random()*heartSymbols.length)];
    const left = Math.random()*100;
    const duration = 9 + Math.random()*10;
    const size = 14 + Math.random()*22;
    const drift = (Math.random()*80 - 40) + 'px';
    el.style.left = left + 'vw';
    el.style.fontSize = size + 'px';
    el.style.animationDuration = duration + 's';
    el.style.setProperty('--drift', drift);
    bgHearts.appendChild(el);
    setTimeout(()=> el.remove(), duration*1000 + 200);
  }
  for(let i=0;i<8;i++) setTimeout(spawnBgHeart, i*400);
  setInterval(spawnBgHeart, 900);

  // ---------- lock logic ----------
  const PASSKEY = "2026";
  const lockCard = document.getElementById('lockCard');
  const reveal = document.getElementById('reveal');
  const passInput = document.getElementById('passkey');
  const unlockBtn = document.getElementById('unlockBtn');
  const hint = document.getElementById('hint');

  function tryUnlock(){
    if(passInput.value.trim() === PASSKEY){
      // start music immediately, in direct response to the tap —
      // browsers block audio.play() if it fires after a delay/timeout
      bgMusic.volume = 0.55;
      const playAttempt = bgMusic.play();
      if(playAttempt && playAttempt.then){
        playAttempt.then(()=>{
          musicBtn.textContent = '♪ pause our song';
        }).catch(()=>{ /* still blocked — button lets her start it manually */ });
      }

      lockCard.style.opacity = '0';
      lockCard.style.transform = 'translateY(-20px) scale(0.96)';
      setTimeout(()=>{
        lockCard.style.display = 'none';
        reveal.classList.add('show');
        startTyping();
      }, 450);
    } else {
      hint.textContent = "That's not quite it — try again 🤍";
      lockCard.classList.remove('shake');
      void lockCard.offsetWidth;
      lockCard.classList.add('shake');
    }
  }
  unlockBtn.addEventListener('click', tryUnlock);
  passInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') tryUnlock(); });

  // ---------- background music (only activates once a real src is set) ----------
  const bgMusic = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicBtn');

  // ---------- typewriter message ----------
  const fullMessage = "Meri habibti,\n\nTumhe dekh kar lagta hai jaise duniya ki saari khushiyan simat ke ek jagah aa gayi hon. Tum meri dunia ho, mera sabkuch ho — tumhare bina mera koi wajood nahi.\n\nTum meri jaan ka tukda ho, mera sukoon ho jab sab kuch mushkil lage. Mera chotu sa baby, mera pyara sa kaka — jab tum muskurati ho na, meri saari thakan gayab ho jati hai.\n\nMain tumhe jitna bhi pyaar karu, kam hai. Har din tumhare saath aur khoobsurat lagta hai, aur har roz mujhe ehsaas hota hai ke main kitna khush-naseeb hoon ke tum meri zindagi mein ho.\n\nTum meri habibti ho, meri dunia ho, mera sabkuch ho — aur hamesha rahogi.\n\nI love you so much, meri jaan.";
  const typedEl = document.getElementById('typed');
  const cursorEl = document.getElementById('typeCursor');
  const signatureEl = document.getElementById('signature');
  const moreLoveBtn = document.getElementById('moreLoveBtn');

  function startTyping(){
    let i = 0;
    function step(){
      if(i <= fullMessage.length){
        typedEl.textContent = fullMessage.slice(0, i);
        i++;
        setTimeout(step, 32);
      } else {
        cursorEl.style.display = 'none';
        signatureEl.classList.add('show');
        moreLoveBtn.classList.add('show');
      }
    }
    step();
  }

  // ---------- manual music toggle (in case autoplay was blocked) ----------
  if(bgMusic.querySelector('source') && bgMusic.querySelector('source').getAttribute('src')){
    musicBtn.style.display = 'inline-block';
    musicBtn.addEventListener('click', ()=>{
      if(bgMusic.paused){
        bgMusic.play();
        musicBtn.textContent = '♪ pause our song';
      } else {
        bgMusic.pause();
        musicBtn.textContent = '♪ play our song';
      }
    });
  }

  // ---------- confetti heart burst ----------
  moreLoveBtn.addEventListener('click', ()=>{
    for(let i=0;i<24;i++){
      const h = document.createElement('div');
      h.className = 'burst-heart';
      h.textContent = heartSymbols[Math.floor(Math.random()*heartSymbols.length)];
      const angle = Math.random()*Math.PI*2;
      const dist = 150 + Math.random()*220;
      h.style.setProperty('--bx', Math.cos(angle)*dist + 'px');
      h.style.setProperty('--by', Math.sin(angle)*dist + 'px');
      h.style.setProperty('--br', (Math.random()*360) + 'deg');
      h.style.fontSize = (14 + Math.random()*16) + 'px';
      document.body.appendChild(h);
      setTimeout(()=> h.remove(), 1500);
    }
  });
</script>

</body>
</html>
